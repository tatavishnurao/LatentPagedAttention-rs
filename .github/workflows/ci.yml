name: CPU CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cpu:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Validate release script syntax
        run: bash -n scripts/validate_release.sh
      - name: Release validation
        shell: bash
        run: |
          set -o pipefail
          bash scripts/validate_release.sh | tee release-validation.log
          grep -Fx 'CPU_RELEASE_VALIDATION_OK=1' release-validation.log
          grep -Fx 'RELEASE_VALIDATION_OK=1' release-validation.log
